<script>
document.addEventListener('DOMContentLoaded', function() {
    switchPage(1); // 頁面加載時顯示第1頁
});

function switchPage(pageNumber) {
    // 获取所有页面元素
    var pages = document.querySelectorAll('.page');

    // 移除所有页的 active 类并隐藏页面
    pages.forEach(function(page) {
        page.classList.remove('active');
        page.style.display = 'none';
    });

    // 为当前页添加 active 类并显示页面
    var currentPage = document.getElementById('page' + pageNumber);
    currentPage.classList.add('active');
    currentPage.style.display = 'grid';

    // 获取当前页的子项数
    var items = currentPage.querySelectorAll('.grid-item');

    // 动态调整网格布局的对齐方式
    if (items.length < 8) {
        currentPage.style.justifyContent = 'center';
        currentPage.style.alignContent = 'center';
    } else {
        currentPage.style.justifyContent = '';
        currentPage.style.alignContent = '';
    }

    // 更新分页按钮的样式
    var pageButtons = document.querySelectorAll('.pagination dd');
    pageButtons.forEach(function(button) {
        button.classList.remove('active');
    });
    pageButtons[pageNumber - 1].classList.add('active');
}


</script>

<!-- 花車補給站 API 載入 -->
<script>
(function () {
  var sectionMap = {
    '99 元':  'supply-grid-A1',
    '199 元': 'supply-grid-A2',
    '399 元': 'supply-grid-A3',
    '599 元': 'supply-grid-A4'
  };

  function buildCard(item) {
    var price = Number(item.price).toLocaleString();
    var priceHtml = item.originalPrice
      ? '<div class="price-group"><span class="old-price">原價＄' + Number(item.originalPrice).toLocaleString() + '</span><span class="sale-price">$<b>' + price + '</b></span></div>'
      : '<div class="price">$<b>' + price + '</b></div>';
    return '<div class="grid-item" data-gno="' + item.gno + '">' +
      '<a href="https://www.ruten.com.tw/item/' + item.gno + '" target="_self">' +
        '<div class="imgbox">' +
          '<img src="' + item.image + '" loading="lazy">' +
        '</div>' +
        '<div class="pd-content">' +
          '<span class="name">' + item.name + '</span>' +
          priceHtml +
        '</div>' +
      '</a>' +
    '</div>';
  }

  function checkSoldOut(gnos) {
    if (!gnos || !gnos.length) return;
    fetch('https://rtapi.ruten.com.tw/api/prod/v3/index.php/prod?id=' + gnos.join(','))
      .then(function (res) { return res.json(); })
      .then(function (prods) {
        prods.forEach(function (p) {
          if (p.StockQty !== undefined && p.SoldQty !== undefined) {
            if (Number(p.StockQty) - Number(p.SoldQty) <= 0) {
              var target = document.querySelector('.grid-item[data-gno="' + p.ProdId + '"] .imgbox');
              if (target && !target.querySelector('.sold-out-mask')) {
                target.insertAdjacentHTML('beforeend', '<div class="sold-out-mask">完售！</div>');
              }
            }
          }
        });
      })
      .catch(function (e) { console.error('Stock check error:', e); });
  }

  fetch('https://pub.ruten.com.tw/api/pop_store_sub_cart.json')
    .then(function (res) { return res.json(); })
    .then(function (data) {
      var buckets = { 'supply-grid-A1': '', 'supply-grid-A2': '', 'supply-grid-A3': '', 'supply-grid-A4': '' };
      var allGnos = [];
      data.forEach(function (item) {
        var gridId = sectionMap[item.section];
        if (gridId) {
          buckets[gridId] += buildCard(item);
          if (allGnos.indexOf(item.gno) === -1) allGnos.push(item.gno);
        }
      });
      Object.keys(buckets).forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.innerHTML = buckets[id];
      });
      checkSoldOut(allGnos);
    })
    .catch(function (err) { console.error('花車補給站商品載入失敗', err); });
})();
</script>
