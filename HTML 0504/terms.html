    <!-- 活動辦法動態載入 -->
    <script>
    fetch('https://pub.ruten.com.tw/api/pop_store_terms.json')
      .then(function (res) { return res.json(); })
      .then(function (data) {
        var container = document.getElementById('terms-content');
        var html = '';
        data.forEach(function (item) {
          var body = item.content
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .split('\n\n')
            .map(function (para) {
              return '<p>' + para.replace(/\n/g, '<br>') + '</p>';
            })
            .join('');
          html += '<h1>【' + item.title + '】</h1>' + body;
        });
        container.innerHTML = html;
      })
      .catch(function (e) { console.error('terms load error:', e); });
    </script>
