<script>
document.addEventListener('DOMContentLoaded', function() {
    switchPage(1); // 頁面加載時顯示第1頁
});

function switchPage(pageNumber) {
    // 获取所有页面元素
    var pages = document.querySelectorAll('.page');
    
    // 移除所有页的 active 类并隐藏页面
    pages.forEach(function(page) {
        page.classList.remove('active');
        page.style.display = 'none';
    });

    // 为当前页添加 active 类并显示页面
    var currentPage = document.getElementById('page' + pageNumber);
    currentPage.classList.add('active');
    currentPage.style.display = 'grid';

    // 获取当前页的子项数
    var items = currentPage.querySelectorAll('.grid-item');

    // 动态调整网格布局的对齐方式
    if (items.length < 8) {
        currentPage.style.justifyContent = 'center';
        currentPage.style.alignContent = 'center';
    } else {
        currentPage.style.justifyContent = '';
        currentPage.style.alignContent = '';
    }

    // 更新分页按钮的样式
    var pageButtons = document.querySelectorAll('.pagination dd');
    pageButtons.forEach(function(button) {
        button.classList.remove('active');
    });
    pageButtons[pageNumber - 1].classList.add('active');
}


</script>

<!-- 預購新鮮貨 API 載入 -->
<script>
fetch('https://pub.ruten.com.tw/api/pop_store_sub_model.json')
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var html = '';
    data.forEach(function(item) {
      var price = Number(item.price).toLocaleString();
      html +=
        '<div class="grid-item">' +
          '<a href="https://www.ruten.com.tw/item/show?' + item.gno + '" target="_self">' +
            '<div class="imgbox"><img src="' + item.image + '" loading="lazy"></div>' +
            '<div class="pd-content">' +
              '<span class="name">' + item.name + '</span>' +
              '<div class="price">$<b>' + price + '</b></div>' +
            '</div>' +
          '</a>' +
        '</div>';
    });
    document.getElementById('fresh-products').innerHTML = html;
  })
  .catch(function(err) { console.error('商品載入失敗', err); });
</script>

<script>
const openBtn = document.getElementById('js-open-popup');
const overlay = document.getElementById('js-overlay');
const closeBtn = document.getElementById('js-close');

openBtn.addEventListener('click', (e) => {
  e.preventDefault();
  overlay.classList.add('active');
});

closeBtn.addEventListener('click', () => {
  overlay.classList.remove('active');
});

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) {
    overlay.classList.remove('active');
  }
});
</script>
